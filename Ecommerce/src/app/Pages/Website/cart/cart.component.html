  </header><div class="cart-container">
    <h5 class="cart-title">My Cart</h5>
  
    <!-- Cart items list -->
    <div *ngFor="let item of cartItems" class="cart-item">
      <img [src]="item.productImageUrl" alt="{{ item.productName }}" class="cart-item-image">
      <div class="item-details">
        <h4>{{ item.productName }}</h4>
        <p>Price: {{ item.productPrice }} TND</p>
        <div class="quantity-control">
          <label for="quantity">Quantity:</label>
          <input type="number" id="quantity" [(ngModel)]="item.ProductQuantity" (change)="updateQuantity(item)">
        </div>
      </div>
      <button class="btn btn-remove" (click)="removeFromCart(item.CartId)">
        Remove
      </button>
    </div>
  
    <!-- Total Amount Section with Icon -->
    <div *ngIf="cartItems.length > 0" class="total-amount">
      <h3>Total Amount: {{ calculateTotalAmount() }} TND</h3>
    </div>
  
    <!-- Display message if cart is empty -->
    <div *ngIf="cartItems.length === 0" class="empty-cart-message">
      <p>Your cart is empty.</p>
      <button class="btn btn-home" (click)="goHome()">Go Home</button>
    </div>
  
    <!-- Delivery Details Form -->
    <h3>Delivery Details</h3>
    <form (ngSubmit)="confirmOrder()">
      <label for="city">City:</label>
      <select id="city" [(ngModel)]="deliveryCity" name="city" required>
        <option *ngFor="let city of cities" [value]="city">{{ city }}</option>
      </select>
  
      <label for="address">Address:</label>
      <input type="text" id="address" [(ngModel)]="deliveryAddress" name="address" placeholder="Enter your address" required>
  
      <label for="pin">Pin Code:</label>
      <input type="text" id="pin" [(ngModel)]="deliveryPinCode" name="pin" placeholder="Enter your pin code" required>
  
      <button type="submit" class="btn btn-confirm">
        Confirm Order
      </button>
    </form>
  
    <!-- Order confirmation message -->
    <div *ngIf="orderConfirmedMessage" class="order-confirmation">
      <p>{{ orderConfirmedMessage }}</p>
    </div>
    
    <!-- Error message -->
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  </div>
