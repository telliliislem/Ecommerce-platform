<div class="login-container">
    <!-- Icon or Image (User Avatar) -->
    <div class="avatar">
      <img src="https://cdn-icons-png.flaticon.com/512/6388/6388000.png" alt="User Avatar">
    </div>
  <h2>Login</h2>
  
  <!-- Display success message if it exists -->
  <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
  
  <form>
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" [(ngModel)]="username" name="username" required>
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" [(ngModel)]="password" name="password" required>
    </div>

    <button type="submit" (click)="onLogin()">Login</button>
    
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
  </form>
  <div class="signup-link">
    <p>New here? <a href="/sign-in">Sign Up</a></p>
  </div>  
</div>
