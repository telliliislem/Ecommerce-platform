  <main>
    <div class="container mt-5">
      <h6 class="account-title">Account Details</h6>
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="welcome-message text-center text-muted mb-4">
            Welcome back, <strong>{{ accountDetails.fullName }}</strong>!
          </div>
          <form *ngIf="accountDetails">
            <div class="form-group row">
              <label for="username" class="col-sm-3 col-form-label">Username:</label>
              <div class="col-sm-9">
                <input type="text" [(ngModel)]="accountDetails.username" name="username" placeholder="Username" class="form-control" required>
              </div>
            </div>      
            <div class="form-group row">
              <label for="fullName" class="col-sm-3 col-form-label">Full Name:</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" id="fullName" [(ngModel)]="accountDetails.fullName" [readonly]="!isEditing" name="fullName">
              </div>
            </div>
            <div class="form-group row">
              <label for="email" class="col-sm-3 col-form-label">Email:</label>
              <div class="col-sm-9">
                <input type="email" class="form-control" id="email" [(ngModel)]="accountDetails.email" [readonly]="!isEditing" name="email">
              </div>
            </div>
            <div class="form-group row">
              <label for="phoneNumber" class="col-sm-3 col-form-label">Phone Number:</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" id="phoneNumber" [(ngModel)]="accountDetails.phoneNumber" [readonly]="!isEditing" name="phoneNumber">
              </div>
            </div>
            <div class="form-group row">
              <label for="address" class="col-sm-3 col-form-label">Address:</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" id="address" [(ngModel)]="accountDetails.address" [readonly]="!isEditing" name="address">
              </div>
            </div>
            <div class="text-center">
              <button type="button" class="btn btn-primary mr-2" *ngIf="!isEditing" (click)="toggleEdit()">Edit</button>
              <button type="button" class="btn btn-success" *ngIf="isEditing" (click)="updateAccount()">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
