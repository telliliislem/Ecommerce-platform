</header><div class="signup-container">
  <!-- Icon or Image (User Avatar) -->
  <div class="avatar">
    <img src="https://cdn-icons-png.flaticon.com/512/6388/6388000.png" alt="User Avatar">
  </div>
  <h2>Sign Up</h2>
  <form (ngSubmit)="onSignUp(signupForm)" #signupForm="ngForm">
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="input-group-container">
      <div class="input-group half-width">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" [(ngModel)]="fullName" name="fullName" placeholder="Enter your full name" required>
      </div>
      <div class="input-group half-width">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="Enter your email address" required>
      </div>
    </div>
    <div class="input-group-container">
      <div class="input-group half-width">
        <label for="phoneNumber">Phone Number</label>
        <input type="text" id="phoneNumber" [(ngModel)]="phoneNumber" name="phoneNumber" placeholder="Enter your phone number" required>
      </div>
      <div class="input-group half-width">
        <label for="username">Username</label>
        <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Choose a username" required>
      </div>
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Create a password" required>
    </div>
    <button type="submit">Sign Up</button>
  </form>
</div>
